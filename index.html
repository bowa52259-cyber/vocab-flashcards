<style>
  :root {
    --shell-bg: #eef2f7;
    --shell-card: #ffffff;
    --shell-ink: #2c3e50;
    --shell-ink-soft: #7f8c8d;
    --shell-accent: #4a6fa5;
    --shell-accent-2: #2980b9;
    --shell-border: #e0e6ed;
    --shell-shadow: 0 2px 10px rgba(44, 62, 80, 0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--shell-bg);
    color: var(--shell-ink);
  }
  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .top-bar {
    background: linear-gradient(135deg, var(--shell-accent), var(--shell-accent-2));
    color: #fff;
    padding: 14px 20px;
    box-shadow: var(--shell-shadow);
    flex-shrink: 0;
    z-index: 5;
  }
  .top-bar h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .top-bar .sub {
    margin-top: 2px;
    font-size: 12px;
    opacity: 0.85;
  }
  .nav-bar {
    display: flex;
    gap: 8px;
    background: var(--shell-card);
    padding: 10px 16px;
    border-bottom: 1px solid var(--shell-border);
    overflow-x: auto;
    flex-shrink: 0;
    z-index: 4;
  }
  .nav-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    border: 1px solid var(--shell-border);
    background: #fafcff;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    color: var(--shell-ink);
    white-space: nowrap;
    transition: all 0.15s ease;
  }
  .nav-btn:hover {
    border-color: var(--shell-accent-2);
    background: #f0f6ff;
  }
  .nav-btn.active {
    background: var(--shell-accent);
    border-color: var(--shell-accent);
    color: #fff;
  }
  .nav-icon { font-size: 18px; line-height: 1; }
  .nav-text { display: flex; flex-direction: column; text-align: left; }
  .nav-title { font-weight: 600; font-size: 13px; }
  .nav-desc { font-size: 11px; opacity: 0.75; }
  .nav-btn.active .nav-desc { opacity: 0.9; }

  .content {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .pane {
    position: absolute;
    inset: 0;
    display: none;
  }
  .pane.active {
    display: block;
  }
  .tool-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    background: #fff;
  }

  @media (max-width: 640px) {
    .top-bar h1 { font-size: 16px; }
    .nav-desc { display: none; }
    .nav-btn { padding: 8px 10px; }
  }
</style>
</head>

<script>
function switchPage(id) {
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.target === id);
  });
  document.querySelectorAll('.pane').forEach(function(pane) {
    pane.classList.toggle('active', pane.id === 'pane-' + id);
  });
}
